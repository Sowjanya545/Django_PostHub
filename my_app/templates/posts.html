{% extends 'base.html' %}

{% block title %}
<title>Posts</title>
{% endblock title %}

{% block content %}

<h1>Posts</h1>
<hr>

<div style="width:100%; height:100%;">

{% for post in post_list %}

<div class="card" style="width: 40rem; margin: 10px auto;">
  <img src="{{ post.image.url }}" class="card-img-top" alt="...">
  <div class="card-body">
    <p class="card-text">Author:{{ post.author }} | Updated on: {{ post.updated_at }}</p>
    <h5 class="card-title">{{ post.title }}</h5>
    <p class="card-text">{{ post.subtitle }}</p>
    <a href="{% url 'read-post' post.id %}" class="btn btn-primary">Read more</a>

  </div>
</div>

{% endfor %}
</div>
{% endblock content %}
